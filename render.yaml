services:
  - type: web
    name: lumen-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: .            # repo root — Dockerfile copies from backend/
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LOG_FORMAT
        value: json
      - key: WEB_WORKERS
        value: "1"
      - key: WORKER_CONCURRENCY
        value: "1"
